# Gemini Code Assist configuration for Superpowers
# See: https://developers.google.com/gemini-code-assist/docs/customize-gemini-behavior-github

code_review:
  comment_severity_threshold: MEDIUM
  max_review_comments: 10

ignore_patterns:
  - "**/*.jsonl"
  - "docs/plans/**"
  - "RELEASE-NOTES.md"
